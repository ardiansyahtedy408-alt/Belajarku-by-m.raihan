<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BelajarKu - Smart Study Planner</title>
    
    <!-- Meta Tags PWA Premium -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BelajarKu">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#4f46e5">
    
    <!-- Icon Link -->
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3271/3271403.png">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="data:application/manifest+json;charset=utf-8,%7B%22name%22%3A%22BelajarKu%20Management%22%2C%22short_name%22%3A%22BelajarKu%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f8fafc%22%2C%22theme_color%22%3A%22%234f46e5%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22https%3A%2F%2Fcdn-icons-png.flaticon.com%2F512%2F3271%2F3271403.png%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fpng%22%7D%5D%7D">

    <!-- Tailwind & Lucide Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            background-color: #f8fafc;
            color: #1e293b;
        }

        /* Smooth View Switching */
        .app-view { display: none; opacity: 0; }
        .app-view.active { display: block; opacity: 1; animation: viewIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        @keyframes viewIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Glassmorphism Elements */
        .glass-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        /* Interactive Elements */
        .btn-tap { transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .btn-tap:active { transform: scale(0.92); }

        .nav-item { transition: all 0.3s ease; color: #94a3b8; }
        .nav-item.active { color: #4f46e5; }
        .nav-item.active i { transform: translateY(-4px); }

        /* Custom Checkbox */
        .cb-custom {
            width: 22px; height: 22px; border: 2px solid #cbd5e1; border-radius: 7px;
            appearance: none; cursor: pointer; position: relative; transition: 0.2s;
        }
        .cb-custom:checked { background: #4f46e5; border-color: #4f46e5; }
        .cb-custom:checked::after {
            content: '✓'; position: absolute; color: white; font-size: 14px; 
            font-weight: bold; left: 3px; top: -2px;
        }

        /* Subject Cards */
        .subject-card {
            background: white; border: 1px solid #f1f5f9; border-radius: 24px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02);
        }

        .empty-state-anim { animation: float 3s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .media-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .media-item { aspect-ratio: 1; border-radius: 18px; overflow: hidden; position: relative; }

        /* Schedule Specific */
        .day-pill { transition: all 0.3s ease; }
        .day-pill.active { background: #4f46e5; color: white; transform: scale(1.05); }
    </style>
</head>
<body class="pb-24">

    <!-- Top Header -->
    <header class="glass-header sticky top-0 z-50 pt-[var(--safe-top)]">
        <div class="max-w-md mx-auto px-6 py-4 flex items-center justify-between">
            <div id="header-home-content" class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200">
                    <i data-lucide="graduation-cap" class="text-white w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-lg font-extrabold text-slate-900 leading-none">BelajarKu</h1>
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-wider mt-0.5">Created by M. Raihan</p>
                </div>
            </div>

            <div id="header-detail-content" class="hidden w-full flex items-center justify-between">
                <button onclick="goHome()" class="btn-tap w-10 h-10 bg-slate-100 rounded-xl flex items-center justify-center text-slate-600">
                    <i data-lucide="chevron-left" class="w-6 h-6"></i>
                </button>
                <div class="text-center flex-1 mx-2">
                    <h2 id="active-title" class="text-sm font-bold text-slate-800 truncate">Mata Pelajaran</h2>
                    <p class="text-[8px] font-bold text-slate-400 uppercase">BelajarKu Detail</p>
                </div>
                <div class="w-10"></div> 
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto px-6 mt-6">
        
        <!-- HOME VIEW -->
        <div id="view-home" class="app-view active">
            <!-- New Feature: Schedule Widget -->
            <div class="mb-8">
                <div class="flex items-center justify-between mb-4 px-2">
                    <h3 class="text-slate-400 text-[11px] font-bold uppercase tracking-widest">Jadwal Minggu Ini</h3>
                    <button onclick="switchTab('schedule'); openSubject(null); " class="text-indigo-600 text-[10px] font-bold uppercase">Atur Jadwal</button>
                </div>
                <div id="schedule-mini-list" class="flex space-x-3 overflow-x-auto pb-2 no-scrollbar">
                    <!-- Dynamic mini schedule items -->
                </div>
            </div>

            <div class="bg-indigo-600 rounded-[32px] p-6 mb-8 relative overflow-hidden shadow-2xl shadow-indigo-200">
                <div class="relative z-10">
                    <h2 class="text-white text-xl font-bold mb-1">Mata Pelajaran Baru?</h2>
                    <p class="text-indigo-100 text-xs mb-5">Atur jadwal dan materi belajarmu.</p>
                    <div class="flex space-x-2">
                        <input type="text" id="subject-input" placeholder="Nama Mata Pelajaran..." class="flex-1 bg-white/20 border border-white/30 rounded-2xl px-4 py-3 text-white placeholder-indigo-200 outline-none focus:bg-white/30 transition-all text-sm font-medium">
                        <button onclick="addSubject()" class="btn-tap bg-white text-indigo-600 p-3 rounded-2xl shadow-xl">
                            <i data-lucide="plus" class="w-6 h-6"></i>
                        </button>
                    </div>
                </div>
                <div class="absolute -right-10 -bottom-10 w-32 h-32 bg-white/10 rounded-full blur-2xl"></div>
            </div>

            <div class="flex items-center justify-between mb-4">
                <h3 class="text-slate-400 text-[11px] font-bold uppercase tracking-widest px-2">Koleksi Belajar</h3>
            </div>
            
            <div id="subject-list" class="space-y-4"></div>
        </div>

        <!-- DETAIL VIEW -->
        <div id="view-detail" class="app-view">
            <!-- Tasks Tab -->
            <div id="tab-tasks" class="tab-pane active">
                <div class="bg-white rounded-3xl p-5 border border-slate-100 shadow-sm mb-6">
                    <div class="flex items-center space-x-2 mb-4">
                        <div class="w-8 h-8 bg-indigo-50 rounded-lg flex items-center justify-center text-indigo-600">
                            <i data-lucide="list-todo" class="w-4 h-4"></i>
                        </div>
                        <span class="text-xs font-bold text-slate-700 uppercase">Tugas Baru</span>
                    </div>
                    <div class="space-y-3">
                        <input type="text" id="task-input" placeholder="Apa tugasnya?" class="w-full bg-slate-50 rounded-2xl px-4 py-3.5 text-sm outline-none focus:ring-2 focus:ring-indigo-100 transition-all font-medium">
                        <div class="flex space-x-2">
                            <div class="relative flex-1">
                                <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">
                                    <i data-lucide="calendar" class="w-4 h-4"></i>
                                </div>
                                <input type="date" id="task-deadline" class="w-full bg-slate-50 rounded-2xl pl-11 pr-4 py-3.5 text-sm outline-none font-semibold text-slate-700">
                            </div>
                            <button onclick="addTask()" class="btn-tap bg-indigo-600 text-white px-6 rounded-2xl shadow-lg">
                                <i data-lucide="plus" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                </div>
                <div id="task-list" class="space-y-3"></div>
            </div>

            <!-- Notes Tab -->
            <div id="tab-notes" class="tab-pane hidden">
                <div class="bg-white rounded-3xl p-5 border border-slate-100 shadow-sm mb-6">
                    <div class="flex items-center space-x-2 mb-4">
                        <div class="w-8 h-8 bg-emerald-50 rounded-lg flex items-center justify-center text-emerald-600">
                            <i data-lucide="pen-tool" class="w-4 h-4"></i>
                        </div>
                        <span class="text-xs font-bold text-slate-700 uppercase">Rangkuman</span>
                    </div>
                    <input type="text" id="note-title" placeholder="Judul Materi..." class="w-full bg-slate-50 rounded-xl px-4 py-3 mb-3 text-sm font-bold outline-none">
                    <textarea id="note-body" placeholder="Ketik rangkuman di sini..." class="w-full bg-slate-50 rounded-xl px-4 py-3 text-sm min-h-[120px] outline-none mb-3 resize-none font-medium"></textarea>
                    <button onclick="addNote()" class="btn-tap w-full bg-emerald-600 text-white py-3 rounded-2xl font-bold text-sm">Simpan Catatan</button>
                </div>
                <div id="note-list" class="space-y-4"></div>
            </div>

            <!-- Media Tab -->
            <div id="tab-media" class="tab-pane hidden">
                <div class="bg-white rounded-3xl p-5 border border-slate-100 shadow-sm mb-6">
                    <div class="flex items-center space-x-2 mb-4">
                        <div class="w-8 h-8 bg-pink-50 rounded-lg flex items-center justify-center text-pink-600">
                            <i data-lucide="image" class="w-4 h-4"></i>
                        </div>
                        <span class="text-xs font-bold text-slate-700 uppercase">Dokumentasi Foto</span>
                    </div>
                    <label class="btn-tap w-full h-32 border-2 border-dashed border-slate-200 rounded-3xl flex flex-col items-center justify-center bg-slate-50 cursor-pointer">
                        <i data-lucide="camera" class="text-slate-400 w-8 h-8 mb-2"></i>
                        <span class="text-xs font-bold text-slate-500">Unggah Foto Materi</span>
                        <input type="file" id="media-input" class="hidden" accept="image/*" onchange="handleMedia(this)">
                    </label>
                </div>
                <div id="media-list" class="media-grid"></div>
            </div>

            <!-- Schedule Tab (New) -->
            <div id="tab-schedule" class="tab-pane hidden">
                <div class="flex space-x-2 overflow-x-auto no-scrollbar mb-6 pb-2">
                    <button onclick="setScheduleDay(0)" class="day-pill px-4 py-2 rounded-xl text-[10px] font-bold uppercase border border-slate-200 bg-white text-slate-500 shrink-0">Senin</button>
                    <button onclick="setScheduleDay(1)" class="day-pill px-4 py-2 rounded-xl text-[10px] font-bold uppercase border border-slate-200 bg-white text-slate-500 shrink-0">Selasa</button>
                    <button onclick="setScheduleDay(2)" class="day-pill px-4 py-2 rounded-xl text-[10px] font-bold uppercase border border-slate-200 bg-white text-slate-500 shrink-0">Rabu</button>
                    <button onclick="setScheduleDay(3)" class="day-pill px-4 py-2 rounded-xl text-[10px] font-bold uppercase border border-slate-200 bg-white text-slate-500 shrink-0">Kamis</button>
                    <button onclick="setScheduleDay(4)" class="day-pill px-4 py-2 rounded-xl text-[10px] font-bold uppercase border border-slate-200 bg-white text-slate-500 shrink-0">Jumat</button>
                    <button onclick="setScheduleDay(5)" class="day-pill px-4 py-2 rounded-xl text-[10px] font-bold uppercase border border-slate-200 bg-white text-slate-500 shrink-0">Sabtu</button>
                    <button onclick="setScheduleDay(6)" class="day-pill px-4 py-2 rounded-xl text-[10px] font-bold uppercase border border-slate-200 bg-white text-slate-500 shrink-0">Minggu</button>
                </div>

                <div class="bg-white rounded-3xl p-5 border border-slate-100 shadow-sm mb-6">
                    <div class="flex items-center space-x-2 mb-4">
                        <div class="w-8 h-8 bg-blue-50 rounded-lg flex items-center justify-center text-blue-600">
                            <i data-lucide="clock" class="w-4 h-4"></i>
                        </div>
                        <span class="text-xs font-bold text-slate-700 uppercase">Tambah Jadwal</span>
                    </div>
                    <div class="space-y-3">
                        <input type="text" id="sch-subject" placeholder="Nama Pelajaran..." class="w-full bg-slate-50 rounded-xl px-4 py-3 text-sm font-medium outline-none">
                        <div class="flex space-x-2">
                            <input type="time" id="sch-time" class="flex-1 bg-slate-50 rounded-xl px-4 py-3 text-sm font-bold outline-none">
                            <button onclick="addSchedule()" class="btn-tap bg-blue-600 text-white px-6 rounded-xl shadow-lg">
                                <i data-lucide="plus" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div id="schedule-list" class="space-y-3"></div>
            </div>
        </div>
    </main>

    <!-- Navigation -->
    <nav id="bottom-nav" class="hidden fixed bottom-6 left-6 right-6 z-50">
        <div class="glass-nav max-w-md mx-auto rounded-[32px] shadow-2xl border border-white p-2 flex items-center justify-around">
            <button onclick="switchTab('tasks')" id="nav-tasks" class="nav-item active flex-1 py-3 flex flex-col items-center">
                <i data-lucide="check-circle" class="w-6 h-6 mb-1"></i>
                <span class="text-[9px] font-bold uppercase tracking-widest">Tugas</span>
            </button>
            <button onclick="switchTab('notes')" id="nav-notes" class="nav-item flex-1 py-3 flex flex-col items-center">
                <i data-lucide="book-open" class="w-6 h-6 mb-1"></i>
                <span class="text-[9px] font-bold uppercase tracking-widest">Catatan</span>
            </button>
            <button onclick="switchTab('media')" id="nav-media" class="nav-item flex-1 py-3 flex flex-col items-center">
                <i data-lucide="gallery-thumbnails" class="w-6 h-6 mb-1"></i>
                <span class="text-[9px] font-bold uppercase tracking-widest">Media</span>
            </button>
            <button onclick="switchTab('schedule')" id="nav-schedule" class="nav-item flex-1 py-3 flex flex-col items-center">
                <i data-lucide="calendar-days" class="w-6 h-6 mb-1"></i>
                <span class="text-[9px] font-bold uppercase tracking-widest">Jadwal</span>
            </button>
        </div>
    </nav>

    <!-- Modal View -->
    <div id="modal" class="fixed inset-0 bg-black/95 z-[100] hidden flex flex-col items-center justify-center opacity-0 transition-opacity duration-300">
        <button onclick="closeModal()" class="absolute top-12 right-6 text-white bg-white/10 p-3 rounded-full">
            <i data-lucide="x" class="w-6 h-6"></i>
        </button>
        <img id="modal-img" class="max-w-[90%] max-h-[80%] rounded-2xl object-contain">
    </div>

    <script>
        // Database Initialization with Schedule support
        let db = JSON.parse(localStorage.getItem('belajarku_v4')) || { 
            subjects: [],
            weeklySchedule: [[], [], [], [], [], [], []] // Mon-Sun
        };
        if(!db.weeklySchedule) db.weeklySchedule = [[], [], [], [], [], [], []];
        
        let currentSubjectId = null;
        let selectedDay = 0; // Default Monday

        function save() { localStorage.setItem('belajarku_v4', JSON.stringify(db)); }

        function formatDeadline(dateStr) {
            if (!dateStr) return "Tanpa Deadline";
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
            const d = new Date(dateStr);
            return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
        }

        function goHome() {
            currentSubjectId = null;
            document.getElementById('header-home-content').classList.remove('hidden');
            document.getElementById('header-detail-content').classList.add('hidden');
            document.getElementById('view-detail').classList.remove('active');
            document.getElementById('view-home').classList.add('active');
            document.getElementById('bottom-nav').classList.add('hidden');
            renderSubjects();
            renderMiniSchedule();
            lucide.createIcons();
        }

        function openSubject(id) {
            currentSubjectId = id;
            if(id) {
                const sub = db.subjects.find(s => s.id === id);
                document.getElementById('active-title').textContent = sub.name;
            } else {
                document.getElementById('active-title').textContent = "Jadwal Belajar";
            }
            
            document.getElementById('header-home-content').classList.add('hidden');
            document.getElementById('header-detail-content').classList.remove('hidden');
            document.getElementById('view-home').classList.remove('active');
            document.getElementById('view-detail').classList.add('active');
            document.getElementById('bottom-nav').classList.remove('hidden');
            
            const today = new Date().toISOString().split('T')[0];
            const taskDeadline = document.getElementById('task-deadline');
            if(taskDeadline) taskDeadline.value = today;
            
            if(id) switchTab('tasks');
            renderDetail();
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            document.getElementById(`nav-${tab}`).classList.add('active');
            
            if(tab === 'schedule') setScheduleDay(selectedDay);
            lucide.createIcons();
        }

        // --- SUBJECT LOGIC ---
        function addSubject() {
            const input = document.getElementById('subject-input');
            if(!input.value.trim()) return;
            const newSub = { id: Date.now(), name: input.value.trim(), tasks: [], notes: [], media: [] };
            db.subjects.unshift(newSub);
            input.value = '';
            save(); renderSubjects();
        }

        function deleteSubject(id, e) {
            e.stopPropagation();
            if(!confirm("Hapus seluruh data mata pelajaran ini?")) return;
            db.subjects = db.subjects.filter(s => s.id !== id);
            save(); renderSubjects();
        }

        function renderSubjects() {
            const list = document.getElementById('subject-list');
            if(db.subjects.length === 0) {
                list.innerHTML = `<div class="text-center py-12 empty-state-anim"><i data-lucide="ghost" class="w-16 h-16 text-slate-200 mx-auto mb-4"></i><p class="text-slate-400 text-xs font-bold uppercase">Mulai Tambah Mata Pelajaran</p></div>`;
            } else {
                list.innerHTML = db.subjects.map(s => `
                    <div onclick="openSubject(${s.id})" class="subject-card p-5 flex items-center btn-tap">
                        <div class="w-12 h-12 bg-indigo-50 rounded-2xl flex items-center justify-center text-indigo-600 mr-4">
                            <i data-lucide="book" class="w-6 h-6"></i>
                        </div>
                        <div class="flex-1">
                            <h4 class="font-bold text-slate-800 text-sm">${s.name}</h4>
                            <p class="text-[9px] text-slate-400 font-bold uppercase mt-1">
                                ${s.tasks.filter(t => !t.done).length} Tugas Aktif • ${s.notes.length} Catatan
                            </p>
                        </div>
                        <button onclick="deleteSubject(${s.id}, event)" class="p-2 text-slate-200 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>
                `).join('');
            }
            lucide.createIcons();
        }

        // --- SCHEDULE LOGIC ---
        function setScheduleDay(index) {
            selectedDay = index;
            document.querySelectorAll('.day-pill').forEach((p, i) => {
                if(i === index) p.classList.add('active');
                else p.classList.remove('active');
            });
            renderScheduleList();
        }

        function addSchedule() {
            const sub = document.getElementById('sch-subject');
            const time = document.getElementById('sch-time');
            if(!sub.value || !time.value) return;
            
            db.weeklySchedule[selectedDay].push({ id: Date.now(), subject: sub.value, time: time.value });
            // Sort by time
            db.weeklySchedule[selectedDay].sort((a, b) => a.time.localeCompare(b.time));
            
            sub.value = '';
            save(); renderScheduleList();
        }

        function deleteSchedule(id) {
            db.weeklySchedule[selectedDay] = db.weeklySchedule[selectedDay].filter(s => s.id !== id);
            save(); renderScheduleList();
        }

        function renderScheduleList() {
            const list = document.getElementById('schedule-list');
            const items = db.weeklySchedule[selectedDay];
            
            if(items.length === 0) {
                list.innerHTML = `<div class="text-center py-10 opacity-40"><i data-lucide="calendar-x" class="w-10 h-10 mx-auto mb-2"></i><p class="text-[10px] font-bold uppercase">Kosong</p></div>`;
            } else {
                list.innerHTML = items.map(i => `
                    <div class="bg-white p-4 rounded-2xl flex items-center justify-between border border-slate-50 shadow-sm">
                        <div class="flex items-center space-x-4">
                            <div class="bg-blue-50 text-blue-600 px-3 py-1.5 rounded-lg font-bold text-xs">${i.time}</div>
                            <span class="font-bold text-slate-700 text-sm">${i.subject}</span>
                        </div>
                        <button onclick="deleteSchedule(${i.id})" class="text-slate-200 hover:text-red-400"><i data-lucide="minus-circle" class="w-4 h-4"></i></button>
                    </div>
                `).join('');
            }
            lucide.createIcons();
        }

        function renderMiniSchedule() {
            const list = document.getElementById('schedule-mini-list');
            const dayNamesShort = ["Sen", "Sel", "Rab", "Kam", "Jum", "Sab", "Min"];
            
            // Get current day (Mon is 0 in our db but 1 in JS getDay)
            let todayIdx = new Date().getDay() - 1;
            if(todayIdx === -1) todayIdx = 6; // Sunday fix
            
            list.innerHTML = dayNamesShort.map((name, idx) => {
                const count = db.weeklySchedule[idx].length;
                const isToday = todayIdx === idx;
                return `
                    <div onclick="selectedDay=${idx}; switchTab('schedule'); openSubject(null);" class="shrink-0 p-4 rounded-[24px] ${isToday ? 'bg-indigo-600 text-white' : 'bg-white text-slate-400 border border-slate-100'} min-w-[100px] shadow-sm btn-tap">
                        <p class="text-[9px] font-extrabold uppercase mb-1 ${isToday ? 'text-indigo-200' : 'text-slate-300'}">${name}</p>
                        <p class="text-sm font-extrabold">${count} Mapel</p>
                    </div>
                `;
            }).join('');
        }

        // --- TASK & NOTE & MEDIA LOGIC ---
        function getActive() { return db.subjects.find(s => s.id === currentSubjectId); }

        function renderDetail() { 
            if(currentSubjectId) {
                renderTasks(); renderNotes(); renderMedia(); 
            } else {
                renderScheduleList();
            }
        }

        function addTask() {
            const input = document.getElementById('task-input');
            const deadline = document.getElementById('task-deadline');
            if(!input.value.trim() || !getActive()) return;
            getActive().tasks.unshift({ id: Date.now(), text: input.value, deadline: deadline.value, done: false });
            input.value = '';
            save(); renderTasks();
        }

        function toggleTask(id) {
            const task = getActive().tasks.find(t => t.id === id);
            task.done = !task.done;
            save(); renderTasks();
        }

        function deleteTask(id) {
            getActive().tasks = getActive().tasks.filter(t => t.id !== id);
            save(); renderTasks();
        }

        function renderTasks() {
            const list = document.getElementById('task-list');
            if(!getActive()) return;
            const tasks = getActive().tasks;
            if(tasks.length === 0) {
                list.innerHTML = '<p class="text-center text-[10px] text-slate-400 py-6 font-bold uppercase">Tidak ada tugas terdaftar</p>';
            } else {
                list.innerHTML = tasks.map(t => {
                    const isLate = !t.done && t.deadline && new Date(t.deadline) < new Date().setHours(0,0,0,0);
                    return `
                    <div class="bg-white p-4 rounded-3xl flex items-center justify-between border border-slate-50 shadow-sm ${t.done ? 'opacity-50' : ''}">
                        <div class="flex items-center space-x-4 flex-1">
                            <input type="checkbox" class="cb-custom" ${t.done ? 'checked' : ''} onchange="toggleTask(${t.id})">
                            <div class="flex flex-col min-w-0">
                                <span class="text-sm font-bold truncate ${t.done ? 'line-through text-slate-400' : 'text-slate-800'}">${t.text}</span>
                                <span class="text-[10px] font-bold ${isLate ? 'text-red-500' : 'text-slate-400'} mt-1 uppercase">${formatDeadline(t.deadline)} ${isLate ? '• Telat!' : ''}</span>
                            </div>
                        </div>
                        <button onclick="deleteTask(${t.id})" class="ml-4 p-2 text-slate-200 hover:text-red-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>
                `}).join('');
            }
            lucide.createIcons();
        }

        function addNote() {
            const title = document.getElementById('note-title');
            const body = document.getElementById('note-body');
            if(!title.value || !body.value || !getActive()) return;
            getActive().notes.unshift({ id: Date.now(), title: title.value, body: body.value });
            title.value = ''; body.value = '';
            save(); renderNotes();
        }

        function deleteNote(id) { getActive().notes = getActive().notes.filter(n => n.id !== id); save(); renderNotes(); }

        function renderNotes() {
            const list = document.getElementById('note-list');
            if(!getActive()) return;
            const notes = getActive().notes;
            list.innerHTML = notes.length === 0 ? '<p class="text-center text-[10px] text-slate-400 py-4 font-bold">Belum ada catatan</p>' : 
                notes.map(n => `
                <div class="bg-white p-5 rounded-[28px] border border-slate-100 shadow-sm relative">
                    <h5 class="font-extrabold text-slate-900 mb-2">${n.title}</h5>
                    <p class="text-xs text-slate-600 leading-relaxed font-medium">${n.body.replace(/\n/g, '<br>')}</p>
                    <button onclick="deleteNote(${n.id})" class="absolute top-4 right-4 text-slate-200 hover:text-red-500"><i data-lucide="x" class="w-4 h-4"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function handleMedia(input) {
            const file = input.files[0];
            if(!file || !getActive()) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800;
                    let width = img.width, height = img.height;
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    getActive().media.unshift({ id: Date.now(), url: canvas.toDataURL('image/jpeg', 0.8) });
                    save(); renderMedia();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function deleteMedia(id, e) { e.stopPropagation(); getActive().media = getActive().media.filter(m => m.id !== id); save(); renderMedia(); }

        function renderMedia() {
            const list = document.getElementById('media-list');
            if(!getActive()) return;
            const media = getActive().media;
            list.innerHTML = media.length === 0 ? '<div class="col-span-2 py-8 text-center text-[10px] text-slate-400 font-bold uppercase">Belum ada foto materi</div>' : 
                media.map(m => `
                <div class="media-item btn-tap" onclick="openModal('${m.url}')">
                    <img src="${m.url}" class="w-full h-full object-cover">
                    <button onclick="deleteMedia(${m.id}, event)" class="absolute top-2 right-2 bg-black/50 backdrop-blur-md text-white p-2 rounded-xl shadow-lg"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function openModal(url) {
            const modal = document.getElementById('modal');
            document.getElementById('modal-img').src = url;
            modal.classList.remove('hidden');
            setTimeout(() => modal.classList.add('opacity-100'), 10);
        }
        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.remove('opacity-100');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        // --- START APP ---
        goHome();
    </script>
</body>
</html>
